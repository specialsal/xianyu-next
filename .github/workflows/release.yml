name: Build and Release

# 当发布 release 时触发
on:
  release:
    types: [published]

# 授予工作流写入 Release 的权限
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            arch: x64
            ext: .exe
          - os: macos-latest
            target: macos
            arch: x64
            ext: ''
          - os: ubuntu-latest
            target: linux
            arch: x64
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium
        continue-on-error: true

      - name: Build executable
        run: |
          pyinstaller xianyu-auto-reply.spec --clean

      - name: Create distribution package (Windows)
        if: matrix.target == 'windows'
        shell: bash
        run: |
          mkdir -p dist/package
          cp -r dist/xianyu-auto-reply/* dist/package/
          cp -r static dist/package/
          cp -r utils dist/package/
          cp global_config.yml dist/package/
          cp .env.example dist/package/ 2>/dev/null || true
          cd dist
          7z a -tzip xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}.zip package/

      - name: Create distribution package (Unix)
        if: matrix.target != 'windows'
        run: |
          mkdir -p dist/package
          cp -r dist/xianyu-auto-reply/* dist/package/
          cp -r static dist/package/
          cp -r utils dist/package/
          cp global_config.yml dist/package/
          cp .env.example dist/package/ 2>/dev/null || true
          cd dist
          tar -czvf xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}.tar.gz package/

      - name: Upload artifact (Windows)
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}.zip

      - name: Upload artifact (Unix)
        if: matrix.target != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/xianyu-auto-reply-${{ matrix.target }}-${{ matrix.arch }}.tar.gz

  release:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: xianyu-auto-reply-windows-x64
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: xianyu-auto-reply-macos-x64
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: xianyu-auto-reply-linux-x64
          path: ./artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/xianyu-auto-reply-windows-x64.zip
            artifacts/xianyu-auto-reply-macos-x64.tar.gz
            artifacts/xianyu-auto-reply-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
